<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>World eFootball</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.5);
}

nav h1 {
    color: #22c55e;
}

nav a {
    color: white;
    text-decoration: none;
}

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 35px;
}

.hero p {
    color: #ccc;
}

.hero button {
    margin-top: 20px;
    background: #22c55e;
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Cards */
.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.card button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
}
</style>

</head>

<body>

<nav>
    <h1>⚽ World eFootball</h1>
    <a href="#accounts">الحسابات</a>
</nav>

<div class="hero">
    <h2>🔥 أفضل حسابات eFootball في الجزائر</h2>
    <p>شراء سريع + تواصل مباشر عبر واتساب</p>
    <button onclick="document.getElementById('accounts').scrollIntoView()">
        شوف الحسابات
    </button>
</div>

<div class="container" id="accounts">

    <div class="card">
        <h3>🔥 حساب قوي</h3>
        <p>لاعبين نادرين + فريق خرافي</p>
        <p>💰 3000 دج</p>
        <button onclick="window.location.href='https://wa.me/213XXXXXXXXX'">
            شراء الآن
        </button>
    </div>

    <div class="card">
        <h3>⚡ حساب متوسط</h3>
        <p>مناسب للمبتدئين</p>
        <p>💰 1500 دج</p>
        <button onclick="window.location.href='https://wa.me/213XXXXXXXXX'">
            شراء الآن
        </button>
    </div>

</div>

</body>
</html>
